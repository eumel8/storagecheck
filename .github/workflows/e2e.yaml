name: End to End test
permissions:
  contents: read

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Container"]
    types:
      - completed
#  pull_request:
#  push:
#    branches:
#      - end2end

jobs:
  test-chart:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Keep in sync with the node images shipped by the latest kind release.
        # Run .github/workflows/update-kind-matrix.yaml to auto-update this list.
        # Remove a version when kindest/node image is not yet available for it.
        k8s:
          - v1.33.0
          - v1.34.0
          - v1.35.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # -------------------------------------------------------
      # Install Helm
      # -------------------------------------------------------
      - name: Install Helm
        uses: azure/setup-helm@v5

      # -------------------------------------------------------
      # Create kind cluster (kind version auto-resolved to latest)
      # -------------------------------------------------------
      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: test
          node_image: kindest/node:${{ matrix.k8s }}
          wait: 60s

      # -------------------------------------------------------
      # Install Helm chart
      # -------------------------------------------------------
      - name: Install Helm chart
        continue-on-error: true
        run: |
          cd chart
          # helm dependency update
          # in Kind Cluster local-path provisioner is default, so we have a storage class and can directly start
          helm upgrade --install storagecheck . \
            --namespace end2end --create-namespace \
            --set image.tag=latest \
            --wait --timeout 1m

      # -------------------------------------------------------
      # Wait until all pods are Ready
      # -------------------------------------------------------
      - name: Wait for pods to be ready
        continue-on-error: false
        run: |
          # wait not for all pods here
          #kubectl wait --for=condition=Ready pods --all -n end2end --timeout=120s
          # wait for the main app pod
          kubectl wait --for=condition=Ready pods -lapp.kubernetes.io/instance=storagecheck -n end2end --timeout=120s
          # wait for create the storage-check
          kubectl wait --for=Create pods -lapp=storage-check -n end2end --timeout=120s
          # wait for delete the storage-check
          kubectl wait --for=Delete pods -lapp=storage-check -n end2end --timeout=120s
          kubectl get pods -n end2end --show-labels
          kubectl get services -n end2end

      # -------------------------------------------------------
      # Port-forward and Post-Install Curl Test
      # -------------------------------------------------------
      - name: Run Post-Install HTTP Check
        run: |
          EXPECTED="storage_check_success_total 1"
          OUTPUT=$(kubectl get --raw /api/v1/namespaces/end2end/services/storagecheck:8080/proxy/metrics | grep "storage_check_success_total 1")
          echo "Output: $OUTPUT"

          if [[ "$OUTPUT" != *"$EXPECTED"* ]]; then
            echo "❌ Expected output not found!"
            exit 1
          fi

          echo "✔ Output validated successfully"

      # -------------------------------------------------------
      # Debug info on failure
      # -------------------------------------------------------
      - name: Dump logs on failure
        if: failure()
        run: |
          kubectl get all -A
          kubectl describe pods -A
          kubectl logs -l app.kubernetes.io/name=storagecheck -n end2end --tail=200 || true

